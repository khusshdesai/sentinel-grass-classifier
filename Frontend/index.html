<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Grass Classifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <h1>Satellite Grass Classifier</h1>
        <p class="subtitle">Powered by Google Earth Engine & Random Forest ML</p>
        
        <form id="predictionForm">
            <div class="input-group">
                <label for="latitude">Latitude</label>
                <input type="text" id="latitude" placeholder="e.g. 40°46'52.35&quot;N or 40.78" required>
            </div>
            <div class="input-group">
                <label for="longitude">Longitude</label>
                <input type="text" id="longitude" placeholder="e.g. 73°57'57.25&quot;W or -73.96" required>
            </div>
            
            <div class="row">
                <div class="input-group">
                    <label for="date_start">Start Date</label>
                    <input type="date" id="date_start" value="2024-05-01" required>
                </div>
                <div class="input-group">
                    <label for="date_end">End Date</label>
                    <input type="date" id="date_end" value="2024-05-30" required>
                </div>
            </div>

            <button type="submit" id="submitBtn">
                <span id="btnText">Analyze Terrain</span>
                <div id="loadingSpinner" class="spinner hidden"></div>
            </button>
        </form>

        <div id="resultsPanel" class="results-panel hidden">
            <h2>Analysis Results</h2>
            <div class="results-grid">
                <div class="stat-box">
                    <h3>Classification</h3>
                    <p id="resPrediction" class="highlight">--</p>
                </div>
                <div class="stat-box">
                    <h3>Confidence</h3>
                    <p id="resConfidence">--%</p>
                </div>
                <div class="stat-box">
                    <h3>Grass Cover</h3>
                    <p id="resPercentage">--%</p>
                </div>
                <div class="stat-box">
                    <h3>NDVI Mean</h3>
                    <p id="resNdvi">--</p>
                </div>
            </div>
            
            <div class="maps-container">
                <div class="map-box">
                    <h3>ML Prediction Mask</h3>
                    <img id="resMap" src="" alt="ML Prediction Map">
                </div>
                <div class="map-box">
                    <h3>Raw NDVI Thumbnail</h3>
                    <img id="resNdviMap" src="" alt="Raw NDVI Map">
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
